[tool.pyrefly]
python_interpreter = "C:/Python314/python.exe"
search_path = ["dashboard", "pipeline", "backend"]

# Suppress false-positive "Cannot find module" errors for third-party
# libraries installed in the runtime interpreter but not visible to the
# Store-Python 3.10 stub that Pyrefly defaults to on this machine.
ignore_missing_imports = true
ignore_unresolved_imports = true

# Exclude auto-generated virtual files and non-Python asset directories.
exclude = [
    "__pyrefly_virtual__",
    "node_modules",
    ".git",
    "gis_maps",
    "field_data",
    "ml_models",
    "satellite_data",
    "presentation",
    "documentation",
]

[tool.pyrefly.errors]
# The dashboard uses a dynamic `from app import app` pattern that is valid
# at runtime but confuses static analysers.  Silence module-level errors.
bad-module-import = false
